# Single Docker image: Express serves API + SPA. ECS uses IAM role LabRole (Terraform data source).

# Secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION

# Terraform remote state — S3 only. CI uses a fixed bucket name per repo (no Actions Variables):
#   Bucket: shopsmart-tf-<github.repository_id>
#   Key:    shopsmart/terraform.tfstate
# If head-bucket fails, CI runs create-bucket + versioning + public-access block (requires s3:CreateBucket on your role).

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Prepare report directories
        run: mkdir -p server/reports client/reports server/public

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server tests (JUnit report)
        working-directory: server
        run: npm test

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client unit and integration tests (Vitest JSON report)
        working-directory: client
        run: npm run test

      - name: Upload test reports (Phase 1 artifacts)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          retention-days: 30
          if-no-files-found: warn
          path: |
            server/reports/
            client/reports/

  terraform:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET_NAME: shopsmart-tf-${{ github.repository_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Ensure Terraform state S3 bucket exists
        run: |
          set -euo pipefail
          echo "State bucket: ${TF_STATE_BUCKET_NAME}"
          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET_NAME}" 2>/dev/null; then
            echo "Bucket already exists."
          else
            echo "Creating bucket..."
            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${TF_STATE_BUCKET_NAME}" --region "${AWS_REGION}"
            else
              aws s3api create-bucket --bucket "${TF_STATE_BUCKET_NAME}" --region "${AWS_REGION}" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi
            aws s3api put-public-access-block \
              --bucket "${TF_STATE_BUCKET_NAME}" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            aws s3api put-bucket-versioning \
              --bucket "${TF_STATE_BUCKET_NAME}" \
              --versioning-configuration Status=Enabled
          fi

      - name: Terraform Init (S3 backend)
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET_NAME}" \
            -backend-config="key=shopsmart/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

  deploy:
    name: Push image and apply Terraform
    needs: [test, terraform]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_image_tag: ${{ github.sha }}
      TF_STATE_BUCKET_NAME: shopsmart-tf-${{ github.repository_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Format Check (deploy)
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Ensure Terraform state S3 bucket exists
        run: |
          set -euo pipefail
          echo "State bucket: ${TF_STATE_BUCKET_NAME}"
          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET_NAME}" 2>/dev/null; then
            echo "State bucket OK"
          else
            echo "Creating bucket..."
            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${TF_STATE_BUCKET_NAME}" --region "${AWS_REGION}"
            else
              aws s3api create-bucket --bucket "${TF_STATE_BUCKET_NAME}" --region "${AWS_REGION}" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi
            aws s3api put-public-access-block \
              --bucket "${TF_STATE_BUCKET_NAME}" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            aws s3api put-bucket-versioning \
              --bucket "${TF_STATE_BUCKET_NAME}" \
              --versioning-configuration Status=Enabled
          fi

      - name: Terraform Init (S3 backend)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET_NAME}" \
            -backend-config="key=shopsmart/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform apply (ECR + S3 only, first)
        run: |
          set -euo pipefail
          terraform apply -auto-approve \
            -target=random_id.bucket_suffix \
            -target=aws_s3_bucket.app_bucket \
            -target=aws_s3_bucket_versioning.app_bucket_versioning \
            -target=aws_s3_bucket_server_side_encryption_configuration.app_bucket_encryption \
            -target=aws_s3_bucket_public_access_block.app_bucket_public_access_block \
            -target=aws_ecr_repository.app

      - name: ECR repository URL for Docker tags
        id: ecr_repo
        run: echo "repo_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.ecr_repo.outputs.repo_url }}:${{ github.sha }}
            ${{ steps.ecr_repo.outputs.repo_url }}:latest

      - name: Terraform apply (full stack, image tag from commit)
        run: terraform apply -auto-approve
