name: ShopSmart CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./dev.db"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # Server checks
      - name: Install Server Dependencies
        run: cd server && npm install

      - name: Run Server Lint
        run: cd server && npm run lint

      - name: Generate Prisma Client
        run: cd server && npx prisma generate

      - name: Push Database Schema
        run: cd server && npx prisma db push --accept-data-loss

      - name: Run Server Tests
        run: cd server && npm test

      # Client checks
      - name: Install Client Dependencies
        run: cd client && npm install

      - name: Run Client Lint
        run: cd client && npm run lint

      - name: Run Client Tests
        run: cd client && npm test

      - name: Build Client
        run: cd client && npm run build

      - name: Install Playwright Browsers
        run: cd client && npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: cd client && npm run test:e2e

  deploy-to-ec2:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to project (try both possible directory names)
            cd ~/Shopsmart_Devops || cd ~/shopsmart
            
            # Pull latest code
            git pull origin main
            
            # SERVER set up
            cd server
            npm install
            npx prisma generate
            npx prisma db push
            npm run build || true
            
            # Restart backend with PM2
            pm2 restart shopsmart-backend --update-env || pm2 start src/index.js --name shopsmart-backend
            
            # CLIENT set up
            cd ../client
            npm install
            npm run build
            
            # Optional: Restart Nginx
            sudo systemctl restart nginx || true
