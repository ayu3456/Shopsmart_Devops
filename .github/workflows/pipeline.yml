name: ShopSmart CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./dev.db"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # Server checks
      - name: Install Server Dependencies
        run: cd server && npm install --legacy-peer-deps

      - name: Run Server Lint
        run: cd server && npm run lint

      - name: Generate Prisma Client
        run: cd server && npx prisma generate

      - name: Push Database Schema
        run: cd server && npx prisma db push --accept-data-loss

      - name: Run Server Tests
        run: cd server && npm test

      # Client checks
      - name: Install Client Dependencies
        run: cd client && npm install --legacy-peer-deps

      - name: Run Client Lint
        run: cd client && npm run lint

      - name: Run Client Tests
        run: cd client && npm test

      - name: Build Client
        run: cd client && npm run build

  deploy-to-ec2:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/shopsmart
            git pull origin main
            cd server
            npm install --legacy-peer-deps
            npm run build || true
            pm2 restart shopsmart-backend || pm2 start src/index.js --name shopsmart-backend
            cd ../client
            npm install --legacy-peer-deps
            npm run build
            # Assuming Nginx serves the build folder
